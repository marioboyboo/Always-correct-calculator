<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gaslight Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
        }
        .calc-body {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #display {
            width: 100%;
            height: 50px;
            background: #a1b56c;
            border: none;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            font-size: 1.5rem;
            box-sizing: border-box;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #555;
            color: white;
        }
        button:active { background: #777; }
        .operator { background: #f39c12; }
        .equals { background: #e74c3c; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="display" disabled value="0">
    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('/')" class="operator">÷</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('*')" class="operator">×</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('-')" class="operator">-</button>
        
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="calculate()" class="equals">=</button>
        <button onclick="appendToDisplay('+')" class="operator">+</button>
    </div>
</div>

<script>
    let currentInput = "";

    function appendToDisplay(value) {
        currentInput += value;
        document.getElementById('display').value = currentInput;
    }

    function clearDisplay() {
        currentInput = "";
        document.getElementById('display').value = "0";
    }

    function calculate() {
        try {
            // Step 1: Get the real answer
            let realAnswer = eval(currentInput);
            
            // Step 2: Apply "Wrong Logic"
            let wrongAnswer;
            
            // 50% chance to be off by exactly 1
            // 30% chance to be multiplied by 1.1
            // 20% chance to just return "7"
            let chaosType = Math.random();
            
            if (chaosType < 0.5) {
                wrongAnswer = realAnswer + 1; 
            } else if (chaosType < 0.8) {
                wrongAnswer = Math.floor(realAnswer * 1.1);
            } else {
                wrongAnswer = 7;
            }

            document.getElementById('display').value = wrongAnswer;
            currentInput = wrongAnswer.toString();
        } catch (e) {
            document.getElementById('display').value = "Error-ish";
        }
    }
</script>

</body>
</html>
