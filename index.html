<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gaslight Calculator 2.0</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Your gorgeous radial gradient background */
            background: radial-gradient(circle, red 0%, orange 15%, yellow 30%, green 45%, cyan 60%, blue 75%, purple 90%, magenta 100%);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; /* Remove default margins */
        }
        .calc-body {
            background: rgba(51, 51, 51, 0.9); /* Translucent so gradient peeks through */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); /* Adds a cool blurred glass effect */
        }
        #display {
            width: 100%;
            height: 50px;
            background: #a1b56c;
            border: none;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            font-size: 1.5rem;
            box-sizing: border-box;
            font-family: inherit;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #555;
            color: white;
            transition: background 0.1s;
        }
        button:active { background: #777; }
        .operator { background: #f39c12; }
        .equals { background: #e74c3c; grid-column: span 2; }
        .clear { background: #e67e22; }
    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="display" disabled value="0">
    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('/')" class="operator">÷</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('*')" class="operator">×</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('-')" class="operator">-</button>
        
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="calculate()" class="equals">=</button>
        <button onclick="appendToDisplay('+')" class="operator">+</button>
    </div>
</div>

<script>
    let currentInput = "";
    let lastResult = null; // Store the last wrong answer

    function appendToDisplay(value) {
        // If there was a previous result, start fresh
        if (lastResult !== null) {
            currentInput = value;
            lastResult = null;
        } else {
            currentInput += value;
        }
        document.getElementById('display').value = currentInput;
    }

    function clearDisplay() {
        currentInput = "";
        lastResult = null;
        document.getElementById('display').value = "0";
    }

    function calculate() {
        try {
            // Step 1: Get the real answer (evaluate the expression)
            // Note: eval() is generally unsafe for user input, but okay for a simple calculator demo
            let realAnswer = eval(currentInput);
            
            // Step 2: Apply an even MORE "Wrong Logic" than before
            let wrongAnswer;
            
            // A more varied chaos logic
            let chaosFactor = Math.random();
            
            if (chaosFactor < 0.35) {
                // ~35% chance: off by a small, positive integer (1-3)
                wrongAnswer = realAnswer + (Math.floor(Math.random() * 3) + 1);
            } else if (chaosFactor < 0.6) {
                // ~25% chance: multiplied by a slight, random factor (1.05 to 1.15)
                wrongAnswer = Math.floor(realAnswer * (1.05 + Math.random() * 0.1));
            } else if (chaosFactor < 0.8) {
                // ~20% chance: off by a small, negative integer (-1 to -3)
                wrongAnswer = realAnswer - (Math.floor(Math.random() * 3) + 1);
            } else if (chaosFactor < 0.9) {
                // ~10% chance: invert the sign (make it negative if positive, and vice-versa)
                wrongAnswer = -realAnswer;
            } else {
                // ~10% chance: just return "7"
                wrongAnswer = 7;
            }

            // Ensure we're showing a number, not NaN or Infinity if the real answer was weird
            if (!isFinite(wrongAnswer)) {
                wrongAnswer = "Error-ish";
            }

            document.getElementById('display').value = wrongAnswer;
            currentInput = ""; // Clear input for the next calculation
            lastResult = wrongAnswer; // Store this wrong answer so we can append to it
        } catch (e) {
            document.getElementById('display').value = "Error-ish";
            currentInput = "";
            lastResult = null;
        }
    }
</script>

</body>
</html>
